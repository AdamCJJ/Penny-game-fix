<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Penny's Rainbow Fairy Closet</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top, #4c1d95 0%, #1a0a2e 48%, #12031f 100%);
      touch-action: none;
      overscroll-behavior: none;
    }

    /* Keep tiny phones portrait-first, but allow tablets and Chromebooks to stay landscape */
    @media screen and (orientation: landscape) and (max-height: 430px) and (max-width: 900px) {
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background: #1a0a2e;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      body::after {
        content: '\1F4F1 Please rotate to portrait!';
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 10000;
        color: white;
        font-family: sans-serif;
        font-size: 24px;
        text-align: center;
        pointer-events: none;
      }
    }

    #game-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    canvas {
      display: block;
      touch-action: none;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
