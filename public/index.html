<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TruckSight</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23f59e0b'/><text x='16' y='22' text-anchor='middle' font-size='14' font-weight='900' fill='%231c1917'>TS</text></svg>" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <!-- Login -->
  <div id="loginScreen" class="login-screen">
    <div class="login-box">
      <div class="logo">
        <div class="logo-icon">TS</div>
        <h1>TruckSight</h1>
      </div>
      <div class="login-card">
        <h2>Enter PIN</h2>
        <p class="muted">Contact your manager if you don't have the PIN.</p>
        <input id="pinInput" type="password" placeholder="PIN" autocomplete="off" />
        <p id="loginErr" class="err"></p>
        <button id="loginBtn" class="btn-primary full">Unlock</button>
      </div>
    </div>
  </div>

  <!-- Main App -->
  <div id="appScreen" class="hidden">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="topbar-left">
          <div class="logo-icon-sm">TS</div>
          <span class="topbar-title">TruckSight</span>
        </div>
        <nav class="topbar-nav">
          <button id="navEstimate" class="nav-btn active">Estimate</button>
          <button id="navHistory" class="nav-btn">History</button>
          <button id="logoutBtn" class="nav-link">Logout</button>
        </nav>
      </div>
    </header>

    <!-- Estimate Screen -->
    <main id="estimateScreen" class="container">
      <div class="two-col">
        <!-- Left: inputs -->
        <div class="col-inputs">
          <!-- Agent -->
          <div class="card">
            <label class="field-label">Your Name / Agent Label</label>
            <input id="agentLabel" type="text" placeholder="e.g., Nicole, Stephanie, Adam" />
          </div>

          <!-- Job Type -->
          <div class="card">
            <label class="field-label">Job Type</label>
            <div class="radio-group">
              <label class="radio-card selected">
                <input type="radio" name="jobType" value="STANDARD" checked />
                <div>
                  <strong>Standard Junk Removal</strong>
                  <span class="muted">Estimate all debris/items shown</span>
                </div>
              </label>
              <label class="radio-card">
                <input type="radio" name="jobType" value="DUMPSTER_CLEANOUT" />
                <div>
                  <strong>Dumpster Cleanout</strong>
                  <span class="muted">All debris around, on top, and inside dumpster</span>
                </div>
              </label>
              <label class="radio-card">
                <input type="radio" name="jobType" value="DUMPSTER_OVERFLOW" />
                <div>
                  <strong>Dumpster Overflow</strong>
                  <span class="muted">Debris around/on top + arms-length inside</span>
                </div>
              </label>
              <label class="radio-card">
                <input type="radio" name="jobType" value="TRUCK_VERIFY" />
                <div>
                  <strong>Verify Truck Load</strong>
                  <span class="muted">Check how full a vendor's truck actually is</span>
                </div>
              </label>
            </div>
          </div>

          <!-- Dumpster size (conditional) -->
          <div id="dumpsterBox" class="card hidden">
            <label class="field-label">Dumpster Size</label>
            <select id="dumpsterSize">
              <option value="UNKNOWN">Unknown</option>
              <option value="2">2 yard</option>
              <option value="4">4 yard</option>
              <option value="6">6 yard</option>
              <option value="8">8 yard</option>
              <option value="10">10 yard</option>
              <option value="15">15 yard</option>
              <option value="20">20 yard</option>
              <option value="30">30 yard</option>
              <option value="40">40 yard</option>
            </select>
          </div>

          <!-- Truck verify (conditional) -->
          <div id="truckVerifyBox" class="card hidden">
            <label class="field-label">Truck Size (cubic yards)</label>
            <input id="truckSize" type="number" value="15" />
            <label class="field-label" style="margin-top:12px">What did the vendor claim?</label>
            <input id="vendorClaim" type="text" placeholder='e.g., "3/4 full" or "11 cubic yards"' />
          </div>

          <!-- Reference object -->
          <div class="card">
            <label class="field-label">Scale Reference Object <span class="muted">(optional — improves accuracy)</span></label>
            <select id="referenceObject">
              <option value="">Let AI detect automatically</option>
              <option value='Standard interior door (80" tall x 36" wide)'>Standard interior door (80" × 36")</option>
              <option value="96-gallon rolling trash cart (45 inches tall)">96-gallon rolling cart (45" tall)</option>
              <option value="32-gallon trash can (27 inches tall)">32-gallon trash can (27" tall)</option>
              <option value="Standard privacy fence (6 feet tall)">Privacy fence (6 ft tall)</option>
              <option value="Chain-link fence (4 feet tall)">Chain-link fence (4 ft tall)</option>
              <option value="Standard curb (6 inches tall)">Curb (6" tall)</option>
              <option value='Full-size pickup truck bed (8 ft x 5.5 ft x 21 inches)'>Pickup truck bed (8' × 5.5' × 21")</option>
              <option value='Refrigerator (68-70 inches tall)'>Refrigerator (68-70" tall)</option>
              <option value='Concrete/cinder block (8 x 8 x 16 inches)'>Cinder block (8" × 8" × 16")</option>
              <option value='Standard pallet (48 x 40 x 6 inches)'>Pallet (48" × 40" × 6")</option>
            </select>
            <p class="hint">If you can see one of these in the photo, selecting it helps anchor the size estimate.</p>
          </div>

          <!-- Photos -->
          <div class="card">
            <label class="field-label">Upload Photos <span class="muted">(1–12)</span></label>
            <input id="photoInput" type="file" accept="image/*" multiple />
            <div id="markupArea"></div>
          </div>

          <!-- Notes -->
          <div class="card">
            <label class="field-label">Additional Notes <span class="muted">(optional)</span></label>
            <textarea id="notesInput" rows="3" placeholder="Any context: 'only remove curb items', 'pile extends behind fence', etc."></textarea>
          </div>

          <!-- Actions -->
          <div class="actions-row">
            <button id="estimateBtn" class="btn-primary flex-1" disabled>Estimate Volume</button>
            <button id="resetBtn" class="btn-outline hidden">New Estimate</button>
          </div>
        </div>

        <!-- Right: results -->
        <div class="col-results">
          <div id="resultPlaceholder" class="placeholder-box">
            <div class="placeholder-icon">
              <svg width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" /></svg>
            </div>
            <p><strong>Upload photos and click Estimate</strong></p>
            <p class="muted">Results will appear here with full reasoning</p>
          </div>
          <div id="resultArea" class="hidden"></div>
        </div>
      </div>
    </main>

    <!-- History Screen -->
    <main id="historyScreen" class="container hidden">
      <div id="statsBar"></div>
      <div id="historyList"></div>
    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
